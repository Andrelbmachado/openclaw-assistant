<svg viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenClaw startup artwork">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07090d"/>
      <stop offset="0.54" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#11151c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(560 370) rotate(90) scale(420 520)">
      <stop offset="0" stop-color="#ff5c5c" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#ff5c5c" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ff5c5c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6969"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glow)" />

  <g opacity="0.14" stroke="#ffffff">
    <path d="M0 180H1600" />
    <path d="M0 360H1600" />
    <path d="M0 540H1600" />
    <path d="M0 720H1600" />
    <path d="M240 0V900" />
    <path d="M480 0V900" />
    <path d="M720 0V900" />
    <path d="M960 0V900" />
    <path d="M1200 0V900" />
    <path d="M1440 0V900" />
  </g>

  <circle cx="560" cy="390" r="260" fill="#ff5c5c" opacity="0.07" filter="url(#softGlow)" />

  <g transform="translate(360 180)">
    <g transform="translate(0 0)">
      <path d="M260 40C174 40 118 109 118 188C118 270 169 334 227 363V407H293V363C300 363 307 363 313 362V407H379V363C437 333 488 270 488 188C488 109 432 40 346 40H260Z" fill="url(#logo)" />
      <path d="M129 161C74 146 42 163 38 197C35 228 56 255 96 252C129 250 150 220 154 189C156 172 149 163 129 161Z" fill="url(#logo)" />
      <path d="M477 161C532 146 564 163 568 197C571 228 550 255 510 252C477 250 456 220 452 189C450 172 457 163 477 161Z" fill="url(#logo)" />
      <path d="M209 58C188 34 171 26 152 28" stroke="#ff5c5c" stroke-width="10" stroke-linecap="round" />
      <path d="M387 58C408 34 425 26 444 28" stroke="#ff5c5c" stroke-width="10" stroke-linecap="round" />
      <circle cx="225" cy="139" r="19" fill="#04070b" />
      <circle cx="361" cy="139" r="19" fill="#04070b" />
      <circle cx="230" cy="132" r="6" fill="#7ff1e1" />
      <circle cx="366" cy="132" r="6" fill="#7ff1e1" />
    </g>
  </g>

  <g fill="#f5f7fa" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="760" y="340" font-size="72" font-weight="700" letter-spacing="-0.04em">OpenClaw</text>
    <text x="760" y="402" font-size="26" font-weight="500" fill="#b7c0cb">Starting your workspace</text>
    <text x="760" y="442" font-size="22" font-weight="400" fill="#8f9aae">Loading chat, projects, agents, skills, and connections</text>
  </g>

  <g transform="translate(760 500)">
    <rect x="0" y="0" width="420" height="8" rx="4" fill="#ffffff" opacity="0.08" />
    <rect x="0" y="0" width="178" height="8" rx="4" fill="#ff5c5c">
      <animate attributeName="x" values="-90;350" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="width" values="90;180;90" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
